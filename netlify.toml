[build]
  publish = "."
  functions = "netlify/functions"

# Pretty URL: strip .html extension
[[redirects]]
  from = "/founder-exposure-index"
  to = "/founder-exposure-index.html"
  status = 200

[[redirects]]
  from = "/founder-exposure-index.html"
  to = "/founder-exposure-index"
  status = 301
  force = true

# Pretty URL: strip .html extension for FBE
[[redirects]]
  from = "/founder-bottleneck-eliminator"
  to = "/founder-bottleneck-eliminator.html"
  status = 200

[[redirects]]
  from = "/founder-bottleneck-eliminator.html"
  to = "/founder-bottleneck-eliminator"
  status = 301
  force = true

# Pretty URL: strip .html extension for CMA
[[redirects]]
  from = "/culture-maturity-audit"
  to = "/culture-maturity-audit.html"
  status = 200

[[redirects]]
  from = "/culture-maturity-audit.html"
  to = "/culture-maturity-audit"
  status = 301
  force = true

# Pretty URL: strip .html extension for SAA
[[redirects]]
  from = "/system-architecture-audit"
  to = "/system-architecture-audit.html"
  status = 200

[[redirects]]
  from = "/system-architecture-audit.html"
  to = "/system-architecture-audit"
  status = 301
  force = true

# Serverless webhook proxy
[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

# Waitlist count endpoint
[[redirects]]
  from = "/api/waitlist-count"
  to = "/.netlify/functions/waitlist-count"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://www.googletagmanager.com https://player.vimeo.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.cdnfonts.com; font-src 'self' https://fonts.gstatic.com https://fonts.cdnfonts.com data:; img-src 'self' https://placehold.co data: blob:; connect-src 'self' https://www.google-analytics.com; frame-src https://player.vimeo.com https://www.youtube.com"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.gif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
